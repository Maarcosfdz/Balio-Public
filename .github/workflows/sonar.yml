# ============================================================
# Balio — SonarQube Cloud Analysis
# ============================================================
# Runs on push to main/develop and on Pull Requests.
# Shallow clones are disabled for better analysis relevancy.
# ============================================================

name: SonarQube

on:
  push:
    branches: [ main, develop ]
  pull_request:
    types: [ opened, synchronize, reopened ]

jobs:
  sonar-backend:
    name: Backend — Build & Analyze
    runs-on: ubuntu-latest

    # ── Postgres service (required for integration tests in verify) ──
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: balio
          POSTGRES_USER: balio
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: balio
      DB_USERNAME: balio
      DB_PASSWORD: testpass
      JWT_SIGN_KEY: ${{ secrets.JWT_SIGN_KEY }}
      JWT_ACCESS_EXPIRATION: 15
      JWT_REFRESH_EXPIRATION_DAYS: 7
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      SHOW_SQL: false
      LOG_FLYWAY: INFO
      LOG_SPRING: INFO

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build, test and analyze
        working-directory: backend
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          chmod +x mvnw
          ./mvnw -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar
