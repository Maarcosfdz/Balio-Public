# ============================================================
# Balio — CI Pipeline
# ============================================================
# Compiles, runs Flyway migrations against a real Postgres
# service, executes tests, and generates the JaCoCo report.
# ============================================================

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    # ── Postgres service container (test DB) ──────────────────
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: balio
          POSTGRES_USER: balio
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    # ── Environment variables for Spring Boot ─────────────────
    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: balio
      DB_USERNAME: balio
      DB_PASSWORD: testpass
      JWT_SIGN_KEY: ${{ secrets.JWT_SIGN_KEY }}
      JWT_ACCESS_EXPIRATION: 15
      JWT_REFRESH_EXPIRATION_DAYS: 7
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      SHOW_SQL: false
      LOG_FLYWAY: INFO
      LOG_SPRING: INFO

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up JDK 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      # 3. Build, migrate, test, checkstyle, jacoco
      - name: Build & Test
        working-directory: backend
        run: chmod +x mvnw && ./mvnw clean verify

      # 4. Upload test reports (always, even on failure)
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            backend/target/surefire-reports/
            backend/target/site/jacoco/
