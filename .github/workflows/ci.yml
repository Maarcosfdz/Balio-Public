# ============================================================
# Balio — CI Pipeline
# ============================================================
# Compiles, runs Flyway migrations against a real Postgres
# service, executes tests, and generates the JaCoCo report.
# ============================================================

name: CI

on:
  push:
    branches: [ main, develop ]
      #- '**' # Trigger on all branches
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    # ── Postgres service container (test DB) ──────────────────
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: balio
          POSTGRES_USER: balio
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    # ── Environment variables for Spring Boot ─────────────────
    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: balio
      DB_USERNAME: balio
      DB_PASSWORD: testpass
      JWT_SIGN_KEY: ${{ secrets.JWT_SIGN_KEY }}
      JWT_ACCESS_EXPIRATION: 15
      JWT_REFRESH_EXPIRATION_DAYS: 7
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      SHOW_SQL: false
      LOG_FLYWAY: INFO
      LOG_SPRING: INFO

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up JDK 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      # 3. Build, migrate, test, checkstyle, jacoco
      - name: Build & Test
        working-directory: backend
        run: chmod +x mvnw && ./mvnw clean verify

      # 4. Upload test reports (always, even on failure)
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            backend/target/surefire-reports/
            backend/target/failsafe-reports/
            backend/target/site/jacoco/

      # 5. Cache SonarCloud packages
      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      # 6. SonarCloud analysis — Backend
      - name: SonarCloud Analysis (Backend)
        if: ${{ vars.SONAR_ORGANIZATION != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        working-directory: backend
        run: |
          ./mvnw sonar:sonar \
            -Dsonar.projectKey=${{ vars.SONAR_BACKEND_PROJECT_KEY }} \
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}

  sonar-frontend:
    name: SonarCloud Frontend
    runs-on: ubuntu-latest
    if: ${{ vars.SONAR_ORGANIZATION != '' }}
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests with coverage
        working-directory: frontend
        run: npm run test:coverage

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: SonarCloud Analysis (Frontend)
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ vars.SONAR_FRONTEND_PROJECT_KEY }}
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
            -Dsonar.sources=frontend/src
            -Dsonar.exclusions=frontend/src/**/*.test.ts,frontend/src/**/*.test.tsx,frontend/src/test-setup.ts
            -Dsonar.tests=frontend/src
            -Dsonar.test.inclusions=frontend/src/**/*.test.ts,frontend/src/**/*.test.tsx
            -Dsonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
