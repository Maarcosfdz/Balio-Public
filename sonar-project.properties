# ============================================================
# SonarCloud — Frontend (React + TypeScript)
# ============================================================
# Project key and org are passed via CI environment variables
# or command line: -Dsonar.projectKey=... -Dsonar.organization=...
# ============================================================

sonar.projectKey=${env.SONAR_FRONTEND_PROJECT_KEY}
sonar.organization=${env.SONAR_ORGANIZATION}

sonar.sources=frontend/src
sonar.exclusions=\
  frontend/src/**/*.test.ts,\
  frontend/src/**/*.test.tsx,\
  frontend/src/test-setup.ts

sonar.tests=frontend/src
sonar.test.inclusions=\
  frontend/src/**/*.test.ts,\
  frontend/src/**/*.test.tsx

sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
sonar.sourceEncoding=UTF-8
