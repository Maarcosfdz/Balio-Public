services:
  postgres:
    image: postgres:18.1-bookworm
    container_name: balio-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME:-balio}
      POSTGRES_USER: ${DB_USERNAME:-balio}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-baliopass}
      PGDATA: /var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
