spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/balio
    username: balio
    password: baliopass

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true

project:
  jwt:
    signKey: YourSuperSecretKeyForJWTMustBeAtLeast256BitsLong!!
    expirationMinutes: 480

logging:
  level:
    org.flywaydb: DEBUG
    org.springframework.boot.autoconfigure: DEBUG