CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:balio}${DB_EXTRA_PARAMS:}
    username: ${DB_USERNAME:balio}
    password: ${DB_PASSWORD:change_me_local_password}   # Override via env var in production
    hikari:
      # Serverless-friendly defaults: keep the pool small so idle connections are released.
      # For a single-instance app, 2 connections is enough for normal traffic.
      maximum-pool-size: ${DB_POOL_MAX:2}
      minimum-idle: ${DB_POOL_MIN_IDLE:0}          # Drop to 0 so managed databases can sleep when idle
      idle-timeout: 60000                           # Release idle connections after 60 s
      connection-timeout: 10000                     # Fail fast rather than queue forever
      keepalive-time: 30000                         # Ping every 30 s to prevent provider idle timeouts
      max-lifetime: 300000                          # Retire connections after 5 min

  flyway:
    enabled: true
    locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: ${SHOW_SQL:false}
    open-in-view: false

  cache:
    type: caffeine
    cache-names: chartPreviewSaved,chartPreviewConfig
    caffeine:
      spec: maximumSize=${CHARTS_PREVIEW_CACHE_MAX_SIZE:300},expireAfterWrite=${CHARTS_PREVIEW_CACHE_TTL:5m}

project:
  jwt:
    signKey: ${JWT_SIGN_KEY:DevOnlyKey_MustBeAtLeast256Bits_ChangeInProduction!!}  # Override via env var in production
    accessExpirationMinutes: ${JWT_ACCESS_EXPIRATION:15}
    refreshExpirationDays: ${JWT_REFRESH_EXPIRATION_DAYS:7}

# ── Frontend redirect ─────────────────────────────────────────
FRONTEND_URL: http://localhost:5173

# ── Enable Banking (Open Banking / PSD2) ─────────────────────
enable-banking:
  application-id: ${ENABLE_BANKING_APP_ID:00000000-0000-0000-0000-000000000000}
  private-key-path: ${ENABLE_BANKING_PRIVATE_KEY_PATH:secrets/enablebanking.pem}
  redirect-uri: ${ENABLE_BANKING_REDIRECT_URI:http://localhost:8080/bank/enablebanking/callback}
  api-base-url: https://api.enablebanking.com
  # Metadata for Enable Banking control panel (sandbox)
  # Replace these example values with your real application URLs/emails when applying for production/trial
  allowed-redirect-urls:
    - http://localhost:8080/bank/enablebanking/callback
    - http://localhost:5173/bank-link/callback
  application-description: "Balio - Gestor personal de finanzas (TFG / sandbox). Uso educativo y de pruebas."
  data-protection-email: dpo@balio.example.com
  privacy-url: http://localhost:5173/privacy
  teams-url: https://teams.microsoft.com/l/team/19:balio-team@thread.tacv2

charts:
  preview:
    max-points: ${CHARTS_PREVIEW_MAX_POINTS:100}
    max-table-rows: ${CHARTS_PREVIEW_MAX_TABLE_ROWS:200}

logging:
  level:
    org.flywaydb: ${LOG_FLYWAY:DEBUG}
    org.springframework.boot.autoconfigure: ${LOG_SPRING:DEBUG}
