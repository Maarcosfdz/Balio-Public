CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:balio}
    username: ${DB_USERNAME:balio}
    password: ${DB_PASSWORD:baliopass}   # Override via env var in production

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: ${SHOW_SQL:false}

project:
  jwt:
    signKey: ${JWT_SIGN_KEY:DevOnlyKey_MustBeAtLeast256Bits_ChangeInProduction!!}  # Override via env var in production
    accessExpirationMinutes: ${JWT_ACCESS_EXPIRATION:15}
    refreshExpirationDays: ${JWT_REFRESH_EXPIRATION_DAYS:7}

# ── TrueLayer (Open Banking) ──────────────────────────────────
truelayer:
  client-id: ${TRUELAYER_CLIENT_ID:}
  client-secret: ${TRUELAYER_CLIENT_SECRET:}
  redirect-uri: ${TRUELAYER_REDIRECT_URI:http://localhost:8080/bank/callback}
  auth-base-url: ${TRUELAYER_AUTH_URL:https://auth.truelayer-sandbox.com}
  api-base-url: ${TRUELAYER_API_URL:https://api.truelayer-sandbox.com}

# ── Frontend redirect ─────────────────────────────────────────
FRONTEND_URL: ${FRONTEND_URL:http://localhost:5173}

# ── Enable Banking (Open Banking / PSD2) ─────────────────────
enable-banking:
  application-id: ${ENABLE_BANKING_APP_ID:}
  private-key-path: ${ENABLE_BANKING_PRIVATE_KEY_PATH:}
  redirect-uri: ${ENABLE_BANKING_REDIRECT_URI:http://localhost:8080/bank/enablebanking/callback}
  api-base-url: https://api.enablebanking.com
  # Metadata for Enable Banking control panel (sandbox)
  # Replace these example values with your real application URLs/emails when applying for production/trial
  allowed-redirect-urls:
    - http://localhost:8080/bank/enablebanking/callback
    - http://localhost:5173/bank-link/callback
  application-description: "Balio - Gestor personal de finanzas (TFG / sandbox). Uso educativo y de pruebas."
  data-protection-email: dpo@balio.example.com
  privacy-url: http://localhost:5173/privacy
  teams-url: https://teams.microsoft.com/l/team/19:balio-team@thread.tacv2

logging:
  level:
    org.flywaydb: ${LOG_FLYWAY:DEBUG}
    org.springframework.boot.autoconfigure: ${LOG_SPRING:DEBUG}