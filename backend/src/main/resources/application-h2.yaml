CORS_ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:3000"

spring:
  datasource:
    url: jdbc:h2:mem:balio;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false

  h2:
    console:
      enabled: true          # accessible at /h2-console when running with h2 profile
      path: /h2-console

project:
  jwt:
    signKey: H2DevKey_ForLocalDevelopmentOnly_NotForProduction_AtLeast256Bits!!
    accessExpirationMinutes: 15
    refreshExpirationDays: 7

logging:
  level:
    org.flywaydb: WARN
    org.springframework.boot.autoconfigure: WARN