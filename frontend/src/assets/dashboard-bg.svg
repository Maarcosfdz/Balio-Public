<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="barGrad" x1="0" y1="860" x2="0" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.38"/>
    </linearGradient>
    <linearGradient id="barGrad2" x1="0" y1="860" x2="0" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0.32"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1600" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0891b2" stop-opacity="0.55"/>
      <stop offset="50%" stop-color="#06b6d4" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.45"/>
    </linearGradient>
    <linearGradient id="lineGrad2" x1="0" y1="0" x2="1600" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#34d399" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#6ee7b7" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <!-- subtle grid lines -->
  <g stroke="#475569" stroke-opacity="0.07" stroke-width="1">
    <path d="M0 80H1600"/>
    <path d="M0 180H1600"/>
    <path d="M0 280H1600"/>
    <path d="M0 380H1600"/>
    <path d="M0 480H1600"/>
    <path d="M0 580H1600"/>
    <path d="M0 680H1600"/>
    <path d="M0 780H1600"/>
  </g>
  <g stroke="#475569" stroke-opacity="0.06" stroke-width="1">
    <path d="M110 0V900"/>
    <path d="M270 0V900"/>
    <path d="M430 0V900"/>
    <path d="M590 0V900"/>
    <path d="M750 0V900"/>
    <path d="M910 0V900"/>
    <path d="M1070 0V900"/>
    <path d="M1230 0V900"/>
    <path d="M1390 0V900"/>
  </g>

  <!-- bars (alternating teal / emerald) -->
  <rect x="70"   y="660" width="70" height="200" rx="6" fill="url(#barGrad)"/>
  <rect x="190"  y="620" width="70" height="240" rx="6" fill="url(#barGrad2)"/>
  <rect x="310"  y="520" width="70" height="340" rx="6" fill="url(#barGrad)"/>
  <rect x="430"  y="560" width="70" height="300" rx="6" fill="url(#barGrad2)"/>
  <rect x="550"  y="460" width="70" height="400" rx="6" fill="url(#barGrad)"/>
  <rect x="670"  y="600" width="70" height="260" rx="6" fill="url(#barGrad2)"/>
  <rect x="790"  y="490" width="70" height="370" rx="6" fill="url(#barGrad)"/>
  <rect x="910"  y="420" width="70" height="440" rx="6" fill="url(#barGrad2)"/>
  <rect x="1030" y="510" width="70" height="350" rx="6" fill="url(#barGrad)"/>
  <rect x="1150" y="450" width="70" height="410" rx="6" fill="url(#barGrad2)"/>
  <rect x="1270" y="540" width="70" height="320" rx="6" fill="url(#barGrad)"/>
  <rect x="1390" y="470" width="70" height="390" rx="6" fill="url(#barGrad2)"/>

  <!-- main trend line (teal) -->
  <path d="M0 720 L150 690 L280 740 L420 610 L550 660 L700 520 L830 560 L970 490 L1110 580 L1260 545 L1410 600 L1600 560"
        stroke="url(#lineGrad)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- secondary line (emerald) -->
  <path d="M0 770 L120 730 L250 760 L390 700 L530 760 L680 650 L820 740 L950 660 L1080 710 L1220 690 L1360 745 L1600 725"
        stroke="url(#lineGrad2)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- data dots on main line -->
  <g fill="#0891b2" fill-opacity="0.5">
    <circle cx="150"  cy="690" r="5"/>
    <circle cx="420"  cy="610" r="5"/>
    <circle cx="700"  cy="520" r="5"/>
    <circle cx="970"  cy="490" r="5"/>
    <circle cx="1260" cy="545" r="5"/>
  </g>
</svg>
